<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belanja Revit - Dashboard Bendahara</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">
    
    <div class="max-w-xl mx-auto mt-10 bg-white p-8 rounded-lg shadow-md border border-gray-200">
        <h2 class="text-2xl font-bold text-blue-800 mb-6 border-b-2 border-blue-100 pb-2">Input Transaksi Belanja</h2>
        
        <form id="belanjaForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1">Nama Barang Belanja</label>
                <input type="text" id="namaBarang" required class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-400 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1">Kategori Belanja</label>
                <select id="kategori" required class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-400 outline-none transition-all">
                    <option value="">-- Pilih Kategori --</option>
                    <option value="Logistik">Logistik</option>
                    <option value="Operasional">Operasional</option>
                    <option value="Fasilitas">Fasilitas Kelas</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Jumlah (Qty)</label>
                    <input type="number" id="qty" required min="1" class="w-full border border-gray-300 rounded-md p-2 outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Harga Satuan (Belanja)</label>
                    <input type="number" id="hargaSatuan" required min="0" class="w-full border border-gray-300 rounded-md p-2 outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                </div>
            </div>

            <div class="bg-blue-50 p-4 border border-blue-100 rounded-md space-y-3">
                <p class="text-xs text-blue-700 font-bold mb-2 flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>
                    Sistem otomatis mengompresi gambar (Maks. 1MB)
                </p>
                <div>
                    <label class="block text-sm font-semibold mb-1">Upload Bukti Nota (Mandatori)</label>
                    <input type="file" id="fotoNota" accept="image/*" required class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700 file:cursor-pointer transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Upload Bukti Fisik Barang</label>
                    <input type="file" id="fotoBarang" accept="image/*" required class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700 file:cursor-pointer transition-all">
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-md transition duration-300 shadow-md">
                Simpan Data Transaksi
            </button>
            <p id="statusMsg" class="text-sm mt-3 text-center hidden font-medium"></p>
        </form>
    </div>

    <script>
        // GANTI DENGAN URL WEB APP DARI TAHAP 1
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyNCUoRbQ7hbAyOgRdDv91-hjOYO7tdJwJMFmgoKrTOkQyKHw7RtUthnAOzGankxxYZ/exec';

        // Fungsi Kompresi Sisi Klien menggunakan Canvas
        async function compressImage(file, maxSizeMB = 1) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // Limit resolusi maksimal ke 1280px
                        const MAX_SIZE = 1280;
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height && width > MAX_SIZE) {
                            height *= MAX_SIZE / width;
                            width = MAX_SIZE;
                        } else if (height > MAX_SIZE) {
                            width *= MAX_SIZE / height;
                            height = MAX_SIZE;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);

                        let quality = 0.8;
                        let dataUrl = canvas.toDataURL('image/jpeg', quality);

                        // Kompresi berulang jika ukuran masih lebih dari target (1MB)
                        while (dataUrl.length * 0.75 > maxSizeMB * 1024 * 1024 && quality > 0.1) {
                            quality -= 0.1;
                            dataUrl = canvas.toDataURL('image/jpeg', quality);
                        }
                        resolve(dataUrl);
                    }
                };
            });
        }

        document.getElementById('belanjaForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            const statusMsg = document.getElementById('statusMsg');
            
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Memproses & Mengunggah Data...";
            btnSubmit.classList.replace("bg-green-600", "bg-gray-400");
            btnSubmit.classList.replace("hover:bg-green-700", "hover:bg-gray-500");
            
            statusMsg.className = "text-sm mt-3 text-center text-blue-600 block";
            statusMsg.innerText = "Mohon tunggu, jangan tutup halaman ini...";

            try {
                const fileNota = document.getElementById('fotoNota').files[0];
                const fileBarang = document.getElementById('fotoBarang').files[0];

                const compressedNota = await compressImage(fileNota);
                const compressedBarang = await compressImage(fileBarang);

                const payload = {
                    action: "input_belanja",
                    userRole: "Bendahara", 
                    namaBarang: document.getElementById('namaBarang').value,
                    kategori: document.getElementById('kategori').value,
                    qty: document.getElementById('qty').value,
                    hargaSatuan: document.getElementById('hargaSatuan').value,
                    notaName: `NOTA_${Date.now()}_${fileNota.name}`,
                    notaBase64: compressedNota,
                    barangName: `BRG_${Date.now()}_${fileBarang.name}`,
                    barangBase64: compressedBarang
                };

                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    mode: 'no-cors' 
                });

                statusMsg.className = "text-sm mt-3 text-center text-green-600 block";
                statusMsg.innerText = "Transaski & Dokumentasi berhasil disimpan ke sistem!";
                document.getElementById('belanjaForm').reset();
            } catch (error) {
                console.error(error);
                statusMsg.className = "text-sm mt-3 text-center text-red-600 block";
                statusMsg.innerText = "Gagal mengirim data. Silakan coba beberapa saat lagi.";
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Simpan Data Transaksi";
                btnSubmit.classList.replace("bg-gray-400", "bg-green-600");
                btnSubmit.classList.replace("hover:bg-gray-500", "hover:bg-green-700");
            }
        });
    </script>
</body>
</html>
